<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1F2937;
      background: #fff;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      color: #4C1D95;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #6B7280;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    select, input[type="password"], textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #D1D5DB;
      border-radius: 7px;
      font-size: 13px;
      color: #1F2937;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    select:focus, input:focus, textarea:focus {
      border-color: #7C3AED;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 70px;
      font-size: 12px;
      line-height: 1.5;
    }

    .hint {
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 5px;
      line-height: 1.4;
    }

    .divider {
      border: none;
      border-top: 1px solid #F3F4F6;
      margin: 16px 0;
    }

    button {
      width: 100%;
      padding: 9px;
      background: #7C3AED;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }

    button:hover { background: #6D28D9; }
    button:active { background: #5B21B6; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #059669;
      font-weight: 600;
      min-height: 16px;
    }

    .status.error { color: #DC2626; }

    .usage {
      font-size: 11.5px;
      color: #6B7280;
      line-height: 1.5;
      background: #F9FAFB;
      border-radius: 7px;
      padding: 10px;
    }

    .usage strong { color: #374151; }
  </style>
</head>
<body>
  <div class="title">✦ Research Explainer</div>

  <div class="usage">
    <strong>How to use:</strong> Select any text on a webpage, then click the <strong>✦ Explain</strong> button that appears.
  </div>

  <hr class="divider">

  <div class="field">
    <label>AI Provider</label>
    <select id="provider">
      <option value="openai">OpenAI (GPT-4o)</option>
      <option value="claude">Anthropic (Claude Opus)</option>
    </select>
  </div>

  <div class="field">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your API key here">
    <p class="hint" id="keyHint">OpenAI: starts with sk-… · Get it at platform.openai.com</p>
  </div>

  <div class="field">
    <label>Context hint (optional)</label>
    <textarea id="customPrompt" placeholder="e.g. I attend neuroscience conferences. Explain terms in that context."></textarea>
    <p class="hint">Add domain context to get more relevant explanations.</p>
  </div>

  <div class="field">
    <label>Default explanation language</label>
    <select id="defaultLang">
      <option value="zh">中文</option>
      <option value="en">English</option>
    </select>
    <p class="hint">You can also switch language on the fly inside the panel.</p>
  </div>

  <button id="save">Save Settings</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
